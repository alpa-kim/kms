<svg width="820" height="980" viewBox="0 0 820 980" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<defs>
  <!-- Gradient backgrounds -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f8f6f1"/>
    <stop offset="100%" stop-color="#f0ede6"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e8f5e9"/>
    <stop offset="100%" stop-color="#c8e6c9"/>
  </linearGradient>
  <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ede7f6"/>
    <stop offset="100%" stop-color="#d1c4e9"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#e3f2fd"/>
    <stop offset="100%" stop-color="#bbdefb"/>
  </linearGradient>
  <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffebee"/>
    <stop offset="100%" stop-color="#ffcdd2"/>
  </linearGradient>
  <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fff8e1"/>
    <stop offset="100%" stop-color="#ffecb3"/>
  </linearGradient>
  <linearGradient id="outputGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e8f5e9"/>
    <stop offset="100%" stop-color="#dcedc8"/>
  </linearGradient>
  <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#f5f5f5"/>
    <stop offset="100%" stop-color="#eeeeee"/>
  </linearGradient>

  <!-- Drop shadow filter -->
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/>
  </filter>
  <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="116%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000008"/>
  </filter>

  <!-- Arrow markers -->
  <marker id="arrowMain" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#9e9e9e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#e57373" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#81c784" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowDash" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 2L10 6L2 10" fill="none" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Subtle pattern for background -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.6" fill="#d5d0c4" opacity="0.4"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="820" height="980" fill="url(#bgGrad)" rx="0"/>
<rect width="820" height="980" fill="url(#dots)"/>

<!-- Title -->
<text x="410" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#37474f" letter-spacing="0.5">LangGraph + Claude 메모리 구현 플로우</text>
<line x1="280" y1="54" x2="540" y2="54" stroke="#a5d6a7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 1: 사용자 입력                      -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="310" y="78" width="200" height="50" rx="25" fill="url(#inputGrad)" stroke="#bdbdbd" stroke-width="0.8"/>
</g>
<text x="410" y="107" text-anchor="middle" font-size="14" font-weight="600" fill="#424242">💬  사용자 메시지 입력</text>

<!-- Arrow -->
<line x1="410" y1="128" x2="410" y2="164" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 2: 단기 기억 (Checkpointer)         -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="240" y="170" width="340" height="60" rx="12" fill="url(#greenGrad)" stroke="#66bb6a" stroke-width="0.8"/>
</g>
<circle cx="270" cy="192" r="12" fill="#66bb6a" opacity="0.2"/>
<text x="270" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">①</text>
<text x="290" y="196" font-size="14" font-weight="600" fill="#1b5e20" dx="4">단기 기억 (Checkpointer)</text>
<text x="410" y="216" text-anchor="middle" font-size="11" fill="#388e3c" opacity="0.85">현재 대화 히스토리 불러오기</text>

<!-- Arrow -->
<line x1="410" y1="230" x2="410" y2="266" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 3: Context Window 초과 여부?        -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="260" y="272" width="300" height="58" rx="12" fill="url(#amberGrad)" stroke="#ffb300" stroke-width="0.8"/>
</g>
<!-- Diamond icon -->
<text x="285" y="296" font-size="16" fill="#f57f17">⚠</text>
<text x="304" y="298" font-size="14" font-weight="600" fill="#e65100">Context Window 초과 여부?</text>
<text x="410" y="318" text-anchor="middle" font-size="11" fill="#f57f17" opacity="0.85">토큰 한도 확인</text>


<!-- ═══════════════════════════════════════ -->
<!-- YES branch (초과) → left                 -->
<!-- ═══════════════════════════════════════ -->
<line x1="260" y1="301" x2="168" y2="301" stroke="#e57373" stroke-width="1.5" marker-end="url(#arrowRed)"/>
<rect x="176" y="289" width="38" height="20" rx="10" fill="#ffcdd2"/>
<text x="195" y="303" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">초과</text>

<!-- Vertical connector to trim boxes -->
<line x1="100" y1="301" x2="100" y2="340" stroke="#e57373" stroke-width="1.2" marker-end="url(#arrowRed)"/>

<!-- Trim -->
<g filter="url(#shadowSm)">
  <rect x="36" y="346" width="128" height="48" rx="10" fill="url(#redGrad)" stroke="#ef9a9a" stroke-width="0.8"/>
</g>
<text x="100" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">✂️  Trim</text>
<text x="100" y="384" text-anchor="middle" font-size="10" fill="#c62828" opacity="0.8">오래된 메시지 자르기</text>

<!-- connector -->
<line x1="100" y1="394" x2="100" y2="410" stroke="#e57373" stroke-width="1.2" marker-end="url(#arrowRed)"/>

<!-- Delete -->
<g filter="url(#shadowSm)">
  <rect x="36" y="416" width="128" height="48" rx="10" fill="url(#redGrad)" stroke="#ef9a9a" stroke-width="0.8"/>
</g>
<text x="100" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">🗑  Delete</text>
<text x="100" y="454" text-anchor="middle" font-size="10" fill="#c62828" opacity="0.8">특정 메시지 삭제</text>

<!-- connector -->
<line x1="100" y1="464" x2="100" y2="480" stroke="#e57373" stroke-width="1.2" marker-end="url(#arrowRed)"/>

<!-- Summarize -->
<g filter="url(#shadowSm)">
  <rect x="36" y="486" width="128" height="48" rx="10" fill="url(#redGrad)" stroke="#ef9a9a" stroke-width="0.8"/>
</g>
<text x="100" y="506" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">📝  Summarize</text>
<text x="100" y="524" text-anchor="middle" font-size="10" fill="#c62828" opacity="0.8">핵심만 요약 보관</text>

<!-- Rejoin path from Summarize to LLM -->
<line x1="164" y1="510" x2="210" y2="510" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
<line x1="210" y1="510" x2="210" y2="486" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
<line x1="210" y1="486" x2="240" y2="486" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 3" opacity="0.6" marker-end="url(#arrowDash)"/>


<!-- ═══════════════════════════════════════ -->
<!-- NO branch (정상) → down                  -->
<!-- ═══════════════════════════════════════ -->
<line x1="410" y1="330" x2="410" y2="366" stroke="#81c784" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
<rect x="420" y="336" width="38" height="20" rx="10" fill="#c8e6c9"/>
<text x="439" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">정상</text>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 4: 장기 기억 (Store)                -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="240" y="372" width="340" height="60" rx="12" fill="url(#purpleGrad)" stroke="#9575cd" stroke-width="0.8"/>
</g>
<circle cx="270" cy="394" r="12" fill="#7e57c2" opacity="0.2"/>
<text x="270" y="399" text-anchor="middle" font-size="12" font-weight="700" fill="#4527a0">②</text>
<text x="290" y="398" font-size="14" font-weight="600" fill="#311b92" dx="4">장기 기억 (Store)</text>
<text x="410" y="418" text-anchor="middle" font-size="11" fill="#7e57c2" opacity="0.85">Semantic Search로 관련 기억 검색</text>

<!-- Branch line to sub-items -->
<line x1="580" y1="402" x2="620" y2="402" stroke="#b39ddb" stroke-width="1" opacity="0.6" marker-end="url(#arrowDash)"/>

<!-- Sub-item connector -->
<line x1="620" y1="370" x2="620" y2="450" stroke="#b39ddb" stroke-width="1" opacity="0.4"/>

<!-- Semantic (사실) -->
<g filter="url(#shadowSm)">
  <rect x="632" y="362" width="120" height="32" rx="8" fill="#ede7f6" stroke="#b39ddb" stroke-width="0.6"/>
</g>
<text x="692" y="383" text-anchor="middle" font-size="11" font-weight="500" fill="#5e35b1">🧠 사실 (Semantic)</text>

<!-- Episodic (경험) -->
<g filter="url(#shadowSm)">
  <rect x="632" y="402" width="120" height="32" rx="8" fill="#ede7f6" stroke="#b39ddb" stroke-width="0.6"/>
</g>
<text x="692" y="423" text-anchor="middle" font-size="11" font-weight="500" fill="#5e35b1">📖 경험 (Episodic)</text>

<!-- Procedural (지침) -->
<g filter="url(#shadowSm)">
  <rect x="632" y="442" width="120" height="32" rx="8" fill="#ede7f6" stroke="#b39ddb" stroke-width="0.6"/>
</g>
<text x="692" y="463" text-anchor="middle" font-size="11" font-weight="500" fill="#5e35b1">⚙️ 지침 (Procedural)</text>

<!-- Connector ticks -->
<line x1="620" y1="378" x2="632" y2="378" stroke="#b39ddb" stroke-width="1" opacity="0.5"/>
<line x1="620" y1="418" x2="632" y2="418" stroke="#b39ddb" stroke-width="1" opacity="0.5"/>
<line x1="620" y1="458" x2="632" y2="458" stroke="#b39ddb" stroke-width="1" opacity="0.5"/>


<!-- Arrow -->
<line x1="410" y1="432" x2="410" y2="468" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 5: Claude (LLM) 처리               -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="240" y="474" width="340" height="60" rx="12" fill="url(#blueGrad)" stroke="#64b5f6" stroke-width="0.8"/>
</g>
<circle cx="270" cy="496" r="12" fill="#42a5f5" opacity="0.2"/>
<text x="270" y="501" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">③</text>
<text x="290" y="500" font-size="14" font-weight="600" fill="#0d47a1" dx="4">Claude (LLM) 처리</text>
<text x="410" y="520" text-anchor="middle" font-size="11" fill="#1976d2" opacity="0.85">단기 + 장기 기억 합쳐서 답변 생성</text>

<!-- Arrow -->
<line x1="410" y1="534" x2="410" y2="570" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 6: 기억 업데이트                     -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="240" y="576" width="340" height="60" rx="12" fill="url(#greenGrad)" stroke="#66bb6a" stroke-width="0.8"/>
</g>
<circle cx="270" cy="598" r="12" fill="#66bb6a" opacity="0.2"/>
<text x="270" y="603" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">④</text>
<text x="290" y="602" font-size="14" font-weight="600" fill="#1b5e20" dx="4">기억 업데이트</text>
<text x="410" y="622" text-anchor="middle" font-size="11" fill="#388e3c" opacity="0.85">중요 정보 판단 후 저장</text>

<!-- Two branches down -->
<line x1="340" y1="636" x2="260" y2="680" stroke="#9e9e9e" stroke-width="1.2" marker-end="url(#arrowMain)"/>
<line x1="480" y1="636" x2="560" y2="680" stroke="#9e9e9e" stroke-width="1.2" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- Checkpointer 저장 (단기)                 -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="170" y="686" width="180" height="54" rx="12" fill="url(#greenGrad)" stroke="#66bb6a" stroke-width="0.8"/>
</g>
<text x="260" y="708" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">🔄  Checkpointer 저장</text>
<text x="260" y="728" text-anchor="middle" font-size="10" fill="#388e3c" opacity="0.85">이번 대화 기록</text>


<!-- ═══════════════════════════════════════ -->
<!-- Store 저장 (장기)                        -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="470" y="686" width="180" height="54" rx="12" fill="url(#purpleGrad)" stroke="#9575cd" stroke-width="0.8"/>
</g>
<text x="560" y="708" text-anchor="middle" font-size="13" font-weight="600" fill="#311b92">💾  Store 저장</text>
<text x="560" y="728" text-anchor="middle" font-size="10" fill="#7e57c2" opacity="0.85">Profile / Collection</text>


<!-- Merge lines -->
<line x1="260" y1="740" x2="260" y2="770" stroke="#bdbdbd" stroke-width="1" opacity="0.5"/>
<line x1="560" y1="740" x2="560" y2="770" stroke="#bdbdbd" stroke-width="1" opacity="0.5"/>
<line x1="260" y1="770" x2="560" y2="770" stroke="#bdbdbd" stroke-width="1" opacity="0.5"/>
<line x1="410" y1="770" x2="410" y2="800" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrowMain)"/>


<!-- ═══════════════════════════════════════ -->
<!-- STEP 7: 최종 답변 출력                   -->
<!-- ═══════════════════════════════════════ -->
<g filter="url(#shadow)">
  <rect x="280" y="806" width="260" height="50" rx="25" fill="url(#outputGrad)" stroke="#81c784" stroke-width="0.8"/>
</g>
<text x="410" y="835" text-anchor="middle" font-size="14" font-weight="600" fill="#2e7d32">✅  최종 답변 출력</text>


<!-- ═══════════════════════════════════════ -->
<!-- Loop back (다음 대화)                    -->
<!-- ═══════════════════════════════════════ -->
<line x1="540" y1="831" x2="770" y2="831" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="6 4" opacity="0.45"/>
<line x1="770" y1="831" x2="770" y2="103" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="6 4" opacity="0.45"/>
<line x1="770" y1="103" x2="512" y2="103" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="6 4" opacity="0.45" marker-end="url(#arrowDash)"/>

<!-- Loop label -->
<rect x="744" y="456" width="48" height="68" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5" opacity="0.8"/>
<text x="768" y="478" text-anchor="middle" font-size="10" fill="#9e9e9e" font-weight="500">다음</text>
<text x="768" y="494" text-anchor="middle" font-size="10" fill="#9e9e9e" font-weight="500">대화</text>
<text x="768" y="510" text-anchor="middle" font-size="10" fill="#9e9e9e" font-weight="500">반복</text>


<!-- ═══════════════════════════════════════ -->
<!-- Legend                                   -->
<!-- ═══════════════════════════════════════ -->
<g transform="translate(140, 888)">
  <rect x="0" y="0" width="540" height="72" rx="12" fill="#fafaf8" stroke="#e0e0e0" stroke-width="0.5" opacity="0.9"/>
  <text x="270" y="18" text-anchor="middle" font-size="10" fill="#9e9e9e" font-weight="500" letter-spacing="1">범 례</text>

  <!-- Legend items -->
  <rect x="30" y="34" width="14" height="14" rx="4" fill="url(#greenGrad)" stroke="#66bb6a" stroke-width="0.5"/>
  <text x="50" y="46" font-size="11" fill="#616161">단기 기억</text>

  <rect x="130" y="34" width="14" height="14" rx="4" fill="url(#purpleGrad)" stroke="#9575cd" stroke-width="0.5"/>
  <text x="150" y="46" font-size="11" fill="#616161">장기 기억</text>

  <rect x="230" y="34" width="14" height="14" rx="4" fill="url(#blueGrad)" stroke="#64b5f6" stroke-width="0.5"/>
  <text x="250" y="46" font-size="11" fill="#616161">LLM 처리</text>

  <rect x="330" y="34" width="14" height="14" rx="4" fill="url(#redGrad)" stroke="#ef9a9a" stroke-width="0.5"/>
  <text x="350" y="46" font-size="11" fill="#616161">메모리 정리</text>

  <rect x="440" y="34" width="14" height="14" rx="4" fill="url(#outputGrad)" stroke="#81c784" stroke-width="0.5"/>
  <text x="460" y="46" font-size="11" fill="#616161">출력</text>

  <!-- Dash line legend -->
  <line x1="170" y1="60" x2="200" y2="60" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="210" y="64" font-size="10" fill="#9e9e9e">점선 = 다음 대화로 이어지는 루프</text>
</g>

</svg>
